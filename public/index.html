<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Comment Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
    <header class="header">
        <h1>🤖 AI Code Comment Generator</h1>
        <p>Transform your code into well-documented, commented code using AI</p>
    </header>
        <main class="main-content">
            <section class="input-section">
                <div class="input-header">
                    <h2>📝 Code Input</h2>
                    <div class="controls">
                        <div class="language-selector">
                            <label for="language">Language:</label>
                            <select id="language" name="language">
                                <option value="javascript">JavaScript</option>
                                <option value="python">Python</option>
                                <option value="java">Java</option>
                                <option value="cpp">C++</option>
                                <option value="csharp">C#</option>
                                <option value="php">PHP</option>
                                <option value="ruby">Ruby</option>
                                <option value="go">Go</option>
                                <option value="rust">Rust</option>
                                <option value="typescript">TypeScript</option>
                                <option value="html">HTML</option>
                                <option value="css">CSS</option>
                                <option value="sql">SQL</option>
                            </select>
                        </div>
                        <div class="stats">
                            <span id="lineCount">Lines: 0</span>
                            <span id="charCount">Chars: 0</span>
                        </div>
                    </div>
                </div>
                
                <div class="code-input-container">
                    <textarea 
                        id="codeInput" 
                        placeholder="Paste your code here...&#10;&#10;Example:&#10;function fibonacci(n) {&#10;  if (n <= 1) return n;&#10;  return fibonacci(n-1) + fibonacci(n-2);&#10;}"
                        spellcheck="false"
                    ></textarea>
                </div>

                <div class="action-buttons">
                    <button id="generateBtn" class="btn btn-primary">
                        <span class="btn-text">✨ Generate Comments</span>
                        <div class="spinner hidden"></div>
                    </button>
                    <button id="clearBtn" class="btn btn-secondary">🗑️ Clear</button>
                </div>
            </section>

            <section id="resultsSection" class="results-section hidden">
                <div class="results-header">
                    <h2>📋 Generated Comments</h2>
                    <div class="results-controls">
                        <div class="display-mode-toggle">
                            <button id="sideBySideBtn" class="mode-btn active">Side-by-Side</button>
                            <button id="lineByLineBtn" class="mode-btn">Line-by-Line</button>
                        </div>
                        <div class="export-buttons">
                            <button id="copyBtn" class="btn btn-small">📋 Copy</button>
                            <button id="downloadBtn" class="btn btn-small">💾 Download</button>
                        </div>
                    </div>
                </div>

                <div id="summary" class="summary hidden">
                    <h3>📖 Summary</h3>
                    <p id="summaryText"></p>
                </div>

                <div id="resultsContainer" class="results-container">
                    <div id="sideBySideView" class="side-by-side-view">
                        <div class="code-panel">
                            <h3>📄 Original Code</h3>
                            <pre id="originalCodeDisplay"><code id="originalCodeContent"></code></pre>
                        </div>
                        <div class="explanations-panel">
                            <h3>💡 Line-by-Line Explanations</h3>
                            <div id="explanationsDisplay"></div>
                        </div>
                    </div>

                    <div id="lineByLineView" class="line-by-line-view hidden">
                        <div id="lineByLineContent"></div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Powered by <strong>Gemini 2.5 Flash</strong> • Built with ❤️ for developers</p>
        </footer>
    </div>

    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="spinner large"></div>
            <p>🤖 AI is analyzing your code...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
